version: "3.8"

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: neuro-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow/mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
    container_name: neuro-api
    ports:
      - "3000:3000"
    environment:
      - ENCODING_MODEL_URI=${ENCODING_MODEL_URI:-}
      - ADDICTION_MODEL_URI=${ADDICTION_MODEL_URI:-}
      - ENCODING_MODEL_PATH=${ENCODING_MODEL_PATH:-}
      - ADDICTION_MODEL_PATH=${ADDICTION_MODEL_PATH:-}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: neuro-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: unless-stopped

volumes:
  mlflow-data:
  prometheus-data:
